kind = "web"
previewPath = "/"
title = "j.ai"
version = "1.0.0"
id = "artifacts/jai-website"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24080

[services.development]
run = "pnpm --filter @workspace/jai-website run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/jai-website", "run", "build" ]
publicDir = "artifacts/jai-website/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24080"
BASE_PATH = "/"
